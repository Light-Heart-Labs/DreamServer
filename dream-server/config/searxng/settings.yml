# SECURITY: The installer overwrites this file with a randomized secret_key.
# If you deploy without running install.sh, replace the placeholder below — a static
# secret enables session forgery. Run: openssl rand -hex 32
use_default_settings: true
server:
  secret_key: "CHANGEME-run-the-installer-to-generate-a-secure-key"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
search:
  safe_search: 0
  formats:
    - html
    - json
engines:
  - name: duckduckgo
    disabled: false
  - name: google
    disabled: false
  - name: brave
    disabled: false
  - name: wikipedia
    disabled: false
  - name: github
    disabled: false
  - name: stackoverflow
    disabled: false
