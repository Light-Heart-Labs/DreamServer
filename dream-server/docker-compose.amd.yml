# Dream Server — AMD GPU Overlay (Lemonade inference backend)
# Lemonade provides optimized local AI inference with Vulkan, ROCm, and NPU support.
# ComfyUI GPU config moved to extensions/services/comfyui/compose.amd.yaml
# Use with: docker compose -f docker-compose.base.yml -f docker-compose.amd.yml up -d

services:
  llama-server:
    # Custom llama.cpp ROCm build + Lemonade server
    # Service name stays "llama-server" for compose dependency compatibility
    build:
      context: ./extensions/services/llama-server
      dockerfile: Dockerfile.amd
      args:
        AMDGPU_TARGET: ${AMDGPU_TARGET:-gfx1151}
        LLAMA_CPP_REF: ${LLAMA_CPP_REF:-b8763}
        # ROCM_VERSION: ROCm SDK-Tag des builder-Stage. Default 7.2.1 fixt
        # GDN-Linear-Crash auf gfx1151 (ROCm/rocm-systems#4817 in 7.2.2).
        # Ohne dieses Forward greift der Dockerfile-Default und die .env
        # wird ignoriert.
        ROCM_VERSION: ${ROCM_VERSION:-7.2.1}
        # LEMONADE_REF: Tag des ghcr.io/lemonade-sdk/lemonade-server Base-Image
        # in Stage 2. Default v10.2.0 (gleichlautend mit Upstream
        # Light-Heart-Labs/DreamServer). Lemonade 10.3 brachte eine MoE-
        # Routing-Regression auf ROCm/gfx1151 (siehe Repo-Header).
        LEMONADE_REF: ${LEMONADE_REF:-v10.2.0}
    image: dream-lemonade-server:latest
    entrypoint: ["/opt/lemonade/lemonade-server"]
    command:
      - serve
      - --port
      - "8080"
      - --host
      - "0.0.0.0"
      - --no-tray
      - --llamacpp
      - rocm
      - --llamacpp-args
      # --no-warmup: skip llama.cpp's empty-run warmup pass.
      # On the custom ROCm build (fused Gated Delta Net + flash attention +
      # quantized KV cache q8_0 that Lemonade injects by default) the warmup
      # forward pass segfaults right after `common_init_from_params`,
      # killing the server with exit code -1 before serving the first request.
      # The first real request performs the equivalent allocation safely with
      # actual tensor shapes. Do NOT remove unless the upstream warmup path
      # for fused-GDN + q8_0 KV on ROCm is fixed.
      - "--metrics --host 0.0.0.0 -fa on -b 2048 -ub 256 --no-warmup"
      - --extra-models-dir
      - /models
    expose:
      - "8001"
    volumes:
      - ./data/models:/models:ro
      - lemonade-cache:/root/.cache/huggingface
      - lemonade-llama:/opt/lemonade/llama
      - lemonade-recipe:/root/.cache/lemonade
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-992}"
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-11.5.1}
      - HSA_XNACK=${HSA_XNACK:-1}
      - ROCBLAS_USE_HIPBLASLT=${ROCBLAS_USE_HIPBLASLT:-1}
      - LEMONADE_LLAMACPP_BACKEND=rocm
      - LEMONADE_LLAMACPP_ROCM_BIN=/opt/llama-custom/llama-server
      - LEMONADE_CTX_SIZE=${CTX_SIZE:-131072}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 300s  # Lemonade first boot builds llama-server binary (~3-5 min)
    deploy:
      resources:
        limits:
          cpus: '${LLAMA_CPU_LIMIT:-16.0}'
          memory: ${LLAMA_SERVER_MEMORY_LIMIT:-110G}
        reservations:
          cpus: '${LLAMA_CPU_RESERVATION:-4.0}'
          memory: 8G

  # Services route through LiteLLM (DREAM_MODE=lemonade sets LLM_API_URL=http://litellm:4000).
  # LiteLLM handles the /api/v1 translation to Lemonade internally.
  # LiteLLM enforces auth via LITELLM_MASTER_KEY=${LITELLM_KEY}; clients must present LITELLM_KEY.

  open-webui:
    environment:
      - OPENAI_API_KEY=${LITELLM_KEY}
      - ENABLE_IMAGE_GENERATION=${ENABLE_IMAGE_GENERATION:-true}

  dashboard-api:
    environment:
      - GPU_BACKEND=amd
      - LLM_BACKEND=lemonade
      - LLAMA_METRICS_PORT=8001
    volumes:
      - /sys/class/drm:/sys/class/drm:ro
      - /sys/class/hwmon:/sys/class/hwmon:ro

volumes:
  lemonade-cache:
  lemonade-llama:
  lemonade-recipe:
