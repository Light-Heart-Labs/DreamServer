schema_version: dream.services.v1

compatibility:
  dream_min: "2.0.0"

service:
  id: vikunja
  name: Vikunja (Projects)
  aliases: [projects, tasks, kanban]
  container_name: dream-vikunja
  host_env: VIKUNJA_HOST
  default_host: vikunja
  port: 3456
  external_port_env: VIKUNJA_PORT
  external_port_default: 3456
  health: /api/v1/info
  ui_path: /
  health_timeout: 20  # initial DB migration on first boot
  type: docker
  gpu_backends: [all]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars:
    - key: VIKUNJA_DB_PASSWORD
      required: true
      secret: true
      description: Postgres password for the Vikunja database (auto-generated by setup.sh)
    - key: VIKUNJA_JWT_SECRET
      required: true
      secret: true
      description: JWT signing secret used by Vikunja for user sessions (auto-generated by setup.sh)
    - key: VIKUNJA_API_TOKEN
      required: false
      secret: true
      description: |
        Service API token (created in Vikunja UI under Settings → API Tokens with write
        scope on tasks/projects). Used by Open Claw and the dashboard-api Projects proxy.

features:
  - id: project-management
    name: Project & Task Management
    description: Self-hosted Kanban, lists, and Gantt for tracking AI-managed projects
    icon: ListChecks
    category: productivity
    requirements:
      services: [vikunja]
      vram_gb: 0
    enabled_services_all: [vikunja]
    setup_time: ~1 minute
    priority: 4
    gpu_backends: [all]

