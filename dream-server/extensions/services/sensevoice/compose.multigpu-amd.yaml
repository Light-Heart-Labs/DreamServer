# SenseVoice — AMD multi-GPU isolation overlay.
# Restricts the service to a single GPU via ROCR_VISIBLE_DEVICES. Note: the
# vllm-free FunASR path has no in-container ROCm acceleration, so inference runs
# CPU-mode; this overlay exists for GPU device isolation/parity with Whisper.
services:
  sensevoice:
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "${VIDEO_GID:-44}"
      - "${RENDER_GID:-992}"
    environment:
      ROCR_VISIBLE_DEVICES: "${SENSEVOICE_GPU_INDEX:-0}"
