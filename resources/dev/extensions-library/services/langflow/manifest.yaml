schema_version: dream.services.v1

service:
  id: langflow
  name: Langflow
  aliases: [langflow-ui, flow, visual-workflow]
  container_name: dream-langflow
  host_env: LANGFLOW_HOST
  default_host: langflow
  port: 7860
  external_port_env: LANGFLOW_PORT
  external_port_default: 7802
  health: /health
  type: docker
  gpu_backends: [amd, nvidia, apple]
  category: optional
  depends_on: []
  compose_file: compose.yaml
  description: |
    Langflow is a visual LLM workflow builder that lets you create
    complex AI workflows with a drag-and-drop interface. Supports
    LangChain components, custom components, and real-time testing.

features:
  - id: visual-workflow
    name: Visual LLM Workflow Builder
    description: Visual LLM workflow builder with drag-and-drop
    icon: Workflow
    category: ai
    requirements:
      services: [langflow]
      vram_gb: 0
    enabled_services_all: [langflow]
    setup_time: ~1 minute
    priority: 8
    gpu_backends: [amd, nvidia, apple]
  - id: rag
    name: Visual RAG Pipelines
    description: Build RAG pipelines visually
    icon: Database
    category: ai
    requirements:
      services: [langflow]
      vram_gb: 0
    enabled_services_all: [langflow]
    setup_time: ~1 minute
    priority: 9
    gpu_backends: [amd, nvidia, apple]
  - id: agents
    name: AI Agent Testing
    description: Create and test AI agents visually
    icon: Bot
    category: ai
    requirements:
      services: [langflow]
      vram_gb: 0
    enabled_services_all: [langflow]
    setup_time: ~1 minute
    priority: 10
    gpu_backends: [amd, nvidia, apple]
