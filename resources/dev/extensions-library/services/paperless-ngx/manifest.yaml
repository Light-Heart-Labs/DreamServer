schema_version: dream.services.v1

service:
  id: paperless-ngx
  name: Paperless-ngx
  aliases: [paperless, document-manager]
  container_name: dream-paperless
  host_env: PAPERLESS_HOST
  default_host: paperless
  port: 8000
  external_port_env: PAPERLESS_PORT
  external_port_default: 7807
  health: /accounts/login/
  type: docker
  gpu_backends: [amd, nvidia, apple]
  compose_file: compose.yaml
  category: optional
  depends_on: []
  env_vars: []
  description: |
    Paperless-ngx is a document management system that transforms your physical
    documents into a searchable online archive. OCR, tagging, automatic
    classification, and full-text search for PDFs and images.

features:
  - id: ocr
    name: Automatic OCR
    description: Automatic OCR for scanned PDFs and images
    icon: Scan
    category: productivity
    requirements:
      services: [paperless-ngx]
      vram_gb: 0
    enabled_services_all: [paperless-ngx]
    setup_time: ~1 minute
    priority: 13
    gpu_backends: [amd, nvidia, apple]
  - id: document-tags
    name: Document Tagging
    description: Auto and manual tagging for organization
    icon: Tag
    category: productivity
    requirements:
      services: [paperless-ngx]
      vram_gb: 0
    enabled_services_all: [paperless-ngx]
    setup_time: ~1 minute
    priority: 14
    gpu_backends: [amd, nvidia, apple]
  - id: fulltext-search
    name: Full-Text Search
    description: Search inside all your documents
    icon: Search
    category: productivity
    requirements:
      services: [paperless-ngx]
      vram_gb: 0
    enabled_services_all: [paperless-ngx]
    setup_time: ~1 minute
    priority: 15
    gpu_backends: [amd, nvidia, apple]
  - id: email-import
    name: Email Import
    description: Import documents via email
    icon: Mail
    category: productivity
    requirements:
      services: [paperless-ngx]
      vram_gb: 0
    enabled_services_all: [paperless-ngx]
    setup_time: ~1 minute
    priority: 16
    gpu_backends: [amd, nvidia, apple]
