schema_version: dream.services.v1

service:
  id: flowise
  name: Flowise
  aliases: [flow, workflow]
  container_name: dream-flowise
  host_env: FLOWISE_HOST
  default_host: flowise
  port: 3000
  external_port_env: FLOWISE_PORT
  external_port_default: 7801
  health: /api/v1/health
  type: docker
  gpu_backends: [amd, nvidia, apple]
  category: optional
  depends_on: []
  compose_file: compose.yaml
  description: |
    Visual LLM workflow builder with drag-and-drop interface.
    Build AI agents, chatbots, and automation flows without code.
    Integrates with OpenAI, Anthropic, local models, and 100+ tools.

features:
  - id: workflow
    name: Visual Workflow Builder
    description: Visual drag-and-drop workflow builder
    icon: Workflow
    category: ai
    requirements:
      services: [flowise]
      vram_gb: 0
    enabled_services_all: [flowise]
    setup_time: ~1 minute
    priority: 7
    gpu_backends: [amd, nvidia, apple]
  - id: agents
    name: AI Agent Builder
    description: Build AI agents with tools and memory
    icon: Bot
    category: ai
    requirements:
      services: [flowise]
      vram_gb: 0
    enabled_services_all: [flowise]
    setup_time: ~1 minute
    priority: 8
    gpu_backends: [amd, nvidia, apple]
  - id: integration
    name: 100+ Integrations
    description: 100+ integrations (databases, APIs, LLMs)
    icon: Plug
    category: ai
    requirements:
      services: [flowise]
      vram_gb: 0
    enabled_services_all: [flowise]
    setup_time: ~1 minute
    priority: 9
    gpu_backends: [amd, nvidia, apple]
